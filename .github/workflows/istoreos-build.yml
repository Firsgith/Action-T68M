name: Build iStoreOS (Quarterly)

# 修正后的权限配置（仅保留合法字段）
permissions:
  actions: write   # 支持上传产物、删除旧Workflow记录
  contents: write  # 支持读写仓库内容、管理Release/Tag

# 触发规则：每季度第1个月1号 UTC 0点（北京时间8点）执行 + 手动触发
on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'  # 季度编译：1/4/7/10月1号
  workflow_dispatch:             # 保留手动触发，方便调试

env:
  REPO_URL: https://github.com/istoreos/istoreos
  REPO_BRANCH: main
  TZ: Asia/Shanghai

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      # ===================== 步骤1：极致清理空间 =====================
      - name: Clean System to Free Up Max Space
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get remove -y --purge gcc* g++* multilib*
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /var/log/* /tmp/*
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          df -hT /workdir

      # ===================== 步骤2：克隆源码 + 拉取更新日志 =====================
      - name: Clone Source & Get Update Log
        run: |
          # 取消浅克隆，拉取完整提交记录用于生成更新日志
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          ln -sf /workdir/istoreos $GITHUB_WORKSPACE/istoreos
          cd /workdir/istoreos
          # 拉取所有提交记录
          git fetch --all
          # 生成更新日志：最近90天的提交记录
          echo "===== iStoreOS 更新日志（本次编译） =====" > update_log.md
          git log --since="90 days ago" --pretty=format:"%cd - %s (%h)" --date=short >> update_log.md
          # 打印日志方便查看
          cat update_log.md

      # ===================== 步骤3：安装依赖 =====================
      - name: Install Essential Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex gettext git libncurses5-dev libssl-dev rsync unzip wget zlib1g-dev
          sudo apt-get clean && rm -rf /var/lib/apt/lists/*

      # ===================== 步骤4：编译工具链 =====================
      - name: Build Toolchain and Clean Temp Files
        run: |
          cd /workdir/istoreos
          make defconfig
          make toolchain/install -j$(nproc)
          rm -rf build_dir/toolchain tmp/toolchain logs/toolchain
          df -hT /workdir

      # ===================== 步骤5：加载 .config + 更新Feeds =====================
      - name: Update Feeds and Load Custom .config
        run: |
          cd /workdir/istoreos
          ./scripts/feeds update -a && ./scripts/feeds install -a
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp $GITHUB_WORKSPACE/.config ./ && make defconfig
            echo "===== 自定义 .config 加载成功 ====="
            cat .config | grep -E 'TARGET_|CONFIG_PACKAGE_istore' | head -10
          else
            echo "===== 未找到自定义 .config，使用默认配置 ====="
            make defconfig
          fi

      # ===================== 步骤6：下载依赖包 =====================
      - name: Download Dependencies and Clean Invalid Files
        run: |
          cd /workdir/istoreos
          make download -j8
          find dl -size -1024c -exec rm -f {} \;
          df -hT /workdir

      # ===================== 步骤7：编译固件 =====================
      - name: Build iStoreOS Firmware
        run: |
          cd /workdir/istoreos
          make target/install -j$(nproc) || make -j1 || make -j1 V=s
          rm -rf build_dir/target tmp/target logs/target staging_dir/target
          rm -rf bin/targets/*/*/packages
          ls -lh bin/targets/*/*/

      # ===================== 步骤8：上传固件 + 更新日志 =====================
      - name: Upload Firmware & Update Log
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-Firmware-Quarterly-${{ github.run_id }}-${{ env.REPO_BRANCH }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/update_log.md  # 同时上传更新日志
          retention-days: 180  # 固件保留180天（6个月）

      # ===================== 步骤9：清理旧 workflow 记录 =====================
      - name: Clean Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 180     # 保留180天运行记录
          keep_minimum_runs: 4 # 至少保留4条（对应4个季度）
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # ===================== 步骤10：清理旧 Releases（如需启用请取消注释） =====================
      # - name: Remove Old Releases
      #   uses: dev-drprasad/delete-older-releases@master
      #   with:
      #     keep_latest: 3        # 保留最新3个Release
      #     delete_tags: true     # 同时删除对应的Tag
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
