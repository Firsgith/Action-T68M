name: iStoreOS 完整编译（季度）

permissions:
  actions: write
  contents: write

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/Firsgith/istoreos 
  REPO_BRANCH: istoreos-24.10
  TZ: Asia/Shanghai

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: 检出配置仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 环境初始化
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      /usr/local/lib/android /usr/local/share/chromedriver-linux64
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get remove -y --purge firefox google-chrome-stable microsoft-edge-stable 2>/dev/null || true
          sudo apt-get update --fix-missing -o APT::Get::Show-User-Simulation-Note=no
          sudo apt-get -f install -y -o APT::Get::Show-User-Simulation-Note=no
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          df -hT /

      - name: 克隆源码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          cd /workdir/istoreos
          echo "当前分支：$(git branch -v)"

      - name: 加载配置
        run: |
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp -f "$GITHUB_WORKSPACE/.config" "/workdir/istoreos/.config"
            echo "已加载自定义.config"
          else
            echo "未找到.config，使用默认配置"
          fi

      - name: 安装依赖
        run: |
          sudo apt-get install -y -o APT::Get::Show-User-Simulation-Note=no \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-pyelftools python3-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            diffutils findutils util-linux coreutils pkg-config patch

      - name: 更新Feeds
        run: |
          cd /workdir/istoreos
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 同步配置
        run: |
          cd /workdir/istoreos
          yes "" | make oldconfig

      - name: 缓存Toolchain
        uses: actions/cache@v4
        with:
          path: |
            /workdir/istoreos/staging_dir/toolchain-*
            /workdir/istoreos/staging_dir/host
            /workdir/istoreos/dl
          key: istoreos-${{ env.REPO_BRANCH }}-${{ hashFiles('.config') }}
          restore-keys: |
            istoreos-${{ env.REPO_BRANCH }}-
            istoreos-

      - name: 下载依赖
        run: |
          cd /workdir/istoreos
          make download -j8 2>&1 | tee download.log || make download -j1 V=s
          find dl -size -1024c -exec rm -f {} \;

      # 关键修改：Toolchain编译增加单线程重试和详细错误输出
      - name: 编译工具链
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          
          if [ -d "staging_dir/toolchain-"* ] && [ -f "staging_dir/host/bin/mklibs" ]; then
            echo "Toolchain缓存命中，跳过编译"
          else
            echo "===== 编译工具链（使用 $CORES 核心） ====="
            if ! make toolchain/compile -j$CORES 2>&1 | tee toolchain.log; then
              echo "⚠️ 并行编译失败，尝试单线程详细输出..."
              make toolchain/clean
              if ! make toolchain/compile -j1 V=s 2>&1 | tee toolchain_error.log; then
                echo "::error::Toolchain 编译失败"
                echo "===== 错误日志最后100行 ====="
                tail -100 toolchain_error.log
                echo "===== 检查磁盘空间 ====="
                df -h /
                echo "===== 检查内存 ====="
                free -h
                exit 1
              fi
            fi
            make toolchain/install -j$CORES
          fi
          
          for dir in build_dir/toolchain-* build_dir/host build_dir/hostpkg; do
            [ -d "$dir" ] && rm -rf "$dir"
          done

      - name: 编译内核
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          if ! make kernel/compile -j$CORES 2>&1 | tee kernel.log; then
            make kernel/compile -j1 V=s 2>&1 | tee kernel_error.log
            exit 1
          fi
          make kernel/install -j$CORES
          for dir in build_dir/linux-* build_dir/target/linux; do
            [ -d "$dir" ] && rm -rf "$dir"
          done

      - name: 编译软件包
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          RETRY_SUCCESS=true
          if ! make package/compile -j$CORES 2>&1 | tee package.log; then
            FAILED_PKGS=$(grep "ERROR: package/" package.log | awk -F'/' '{print $2}' | awk '{print $1}' | uniq | grep -v "^$")
            if [ -z "$FAILED_PKGS" ]; then
              echo "未识别到失败包名"
              tail -50 package.log
              exit 1
            fi
            for pkg in $FAILED_PKGS; do
              make package/$pkg/clean
              if ! make package/$pkg/compile -j1 V=s 2>&1 | tee ${pkg}_retry.log; then
                RETRY_SUCCESS=false
              fi
            done
            [ "$RETRY_SUCCESS" = "false" ] && exit 1
          fi
          make package/install -j$CORES
          [ -d "build_dir/package" ] && rm -rf build_dir/package/*

      - name: 生成固件
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          if ! make target/compile -j$CORES 2>&1 | tee target.log; then
            make target/compile -j1 V=s 2>&1 | tee target_error.log
            exit 1
          fi
          make target/install -j$CORES
          for dir in build_dir/target tmp/target staging_dir/target; do
            [ -d "$dir" ] && rm -rf "$dir"
          done
          rm -rf bin/targets/*/*/packages
          ls -lh bin/targets/*/*/

      - name: 生成日志
        run: |
          cd /workdir/istoreos
          echo "# 更新日志（${{ env.REPO_BRANCH }}）" > update_log.md
          echo "生成时间：$(date +'%Y-%m-%d %H:%M:%S')" >> update_log.md
          echo "" >> update_log.md
          echo "**构建信息：**" >> update_log.md
          echo "- 工作流：Build Full（完整编译）" >> update_log.md
          echo "- 分支：${{ env.REPO_BRANCH }}" >> update_log.md
          echo "- Run ID：${{ github.run_id }}" >> update_log.md
          echo "- 提交：${{ github.sha }}" >> update_log.md
          echo "" >> update_log.md
          echo "---" >> update_log.md
          git log --since="90 days ago" --pretty=format:"- %cd: %s (%h)" --date=short >> update_log.md

      - name: 上传产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Custom-iStoreOS-${{ github.run_id }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/bin/targets/*/*/*imagebuilder*.tar.xz
            /workdir/istoreos/bin/targets/*/*/config.buildinfo
            /workdir/istoreos/update_log.md
          retention-days: 30

      - name: 清理旧Release
        if: github.event_name == 'schedule'
        run: |
          RELEASES_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100")
          RELEASE_COUNT=$(echo "$RELEASES_JSON" | jq 'length')
          if [ "$RELEASE_COUNT" -gt 10 ]; then
            echo "$RELEASES_JSON" | jq -r '.[10:] | .[] | "\(.id) \(.tag_name)"' | while read ID TAG; do
              curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$ID"
              curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG" || true
            done
          fi

      - name: 发布Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.REPO_BRANCH }}-${{ github.run_number }}
          name: ${{ env.REPO_BRANCH }} Build ${{ github.run_number }}
          body_path: /workdir/istoreos/update_log.md
          files: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/bin/targets/*/*/*imagebuilder*.tar.xz
            /workdir/istoreos/bin/targets/*/*/config.buildinfo
            /workdir/istoreos/bin/targets/*/*/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 失败诊断
        if: failure()
        run: |
          cd /workdir/istoreos 2>/dev/null || cd $GITHUB_WORKSPACE
          echo "::error::编译失败"
          df -hT /
          free -h
          find build_dir -name "config.log" -type f -mmin -60 2>/dev/null | head -3 | while read log; do
            echo "--- $log ---"
            tail -30 "$log"
          done

      - name: 清理历史记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2.0.3
        with:
          retain_days: 30
          keep_minimum_runs: 4
          token: ${{ secrets.GITHUB_TOKEN }}  # 修正：改为 token
