name: Build Custom iStoreOS (Quarterly)

permissions:
  actions: write
  contents: write

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/Firsgith/istoreos
  REPO_BRANCH: istoreos-24.10
  TZ: Asia/Shanghai

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      # ===================== 步骤1：轻量清理系统空间（修复核心：不破坏系统依赖） =====================
      - name: Clean System to Free Up Max Space (Safe Version)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 仅删除Runner预装的冗余大文件（不触碰系统核心依赖）
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          # 清理apt缓存和临时文件（安全）
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /var/log/* /tmp/*
          # 修复可能的依赖问题（关键！）
          sudo apt-get update
          sudo apt-get -f install -y
          # 创建工作目录
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          # 验证清理后空间
          df -hT /workdir

      # ===================== 步骤2：克隆源码 =====================
      - name: Clone Custom iStoreOS Source Code
        run: |
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          ln -sf /workdir/istoreos $GITHUB_WORKSPACE/istoreos
          cd /workdir/istoreos
          echo "当前分支："
          git branch -v

      # ===================== 步骤3：安装编译依赖（先修复apt，再安装） =====================
      - name: Install All Required Build Dependencies
        run: |
          # 先更新apt源+修复依赖（确保包管理正常）
          sudo apt-get update
          sudo apt-get -f install -y
          # 安装编译依赖（避免通配符，精准安装）
          sudo apt-get install -y \
            binutils bzip2 diff find flex gawk gcc g++ gcc-multilib g++-multilib \
            getopt grep install libc-dev libz-dev libncurses-dev libssl-dev \
            make perl python3 python3-distutils python3-setuptools rsync subversion \
            unzip which clang bison swig zlib1g-dev file wget build-essential
          # 验证关键依赖版本
          echo "===== 关键依赖版本验证 ====="
          gcc --version | head -1
          make --version | head -1
          python3 --version
          # 清理apt缓存
          sudo apt-get clean && rm -rf /var/lib/apt/lists/*

      # ===================== 步骤4：更新Feeds + 加载.config =====================
      - name: Update Feeds and Load Custom .config
        run: |
          cd /workdir/istoreos
          ./scripts/feeds update -a && ./scripts/feeds install -a
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp $GITHUB_WORKSPACE/.config ./
            make defconfig
            echo "===== 自定义.config加载成功 ====="
            cat .config | grep -E 'TARGET_|CONFIG_PACKAGE_istore' | head -10
          else
            echo "===== 未找到自定义.config，使用默认配置 ====="
            make defconfig
          fi

      # ===================== 步骤5：下载依赖包（容错） =====================
      - name: Download All Dependencies (Error Handling)
        run: |
          cd /workdir/istoreos
          echo "===== 开始下载依赖包（8线程） ====="
          if ! make download -j8; then
            echo "===== 依赖包下载出错，单线程+详细日志重新下载 ====="
            make download -j1 V=s 2>&1 | tee download_error.log
            grep -E 'error:|Failed|ERROR:|404|timeout' download_error.log | tail -20
            echo "===== 尝试重试下载 ====="
            make download -j1 || echo "===== 下载仍失败，请检查网络/源地址 ====="
          fi
          find dl -size -1024c -exec rm -f {} \;
          echo "===== 依赖包下载完成，dl目录大小 ====="
          du -sh dl/
          df -hT /workdir

      # ===================== 步骤6：编译工具链（clean→compile→install） =====================
      - name: Build Toolchain (Clean→Compile→Install)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          echo "===== 编译工具链（使用 $USE_CORES 核心，留1核心） ====="
          
          make toolchain/clean
          if ! make toolchain/compile -j$USE_CORES; then
            echo "===== 工具链编译出错，单线程+详细日志 ====="
            make toolchain/compile -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed|ERROR:' toolchain_error.log | tail -20
            exit 1
          fi
          if ! make toolchain/install -j$USE_CORES; then
            echo "===== 工具链安装出错，单线程+详细日志 ====="
            make toolchain/install -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed|ERROR:' toolchain_error.log | tail -20
            exit 1
          fi
          
          rm -rf build_dir/toolchain tmp/toolchain logs/toolchain
          df -hT /workdir

      # ===================== 步骤7：编译固件（clean→compile→install） =====================
      - name: Build Firmware (Full Clean→Compile→Install)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          echo "===== 编译配置：总核心数 $CORES，使用 $USE_CORES 核心（留1核心） ====="
          
          run_with_clean_compile_install() {
            local target=$1
            local log_file=$2
            echo "===== 处理环节：$target ====="
            
            make $target/clean
            echo "===== 已清空 $target 缓存 ====="
            
            if ! make $target/compile -j$USE_CORES; then
              echo "===== 【$target compile】出错，单线程+详细日志 ====="
              make $target/compile -j1 V=s 2>&1 | tee $log_file
              grep -E 'error:|Failed|ERROR:' $log_file | tail -20
              return 1
            fi
            
            if ! make $target/install -j$USE_CORES; then
              echo "===== 【$target install】出错，单线程+详细日志 ====="
              make $target/install -j1 V=s 2>&1 | tee $log_file
              grep -E 'error:|Failed|ERROR:' $log_file | tail -20
              return 1
            fi
            
            echo "===== $target 环节完成 ====="
            return 0
          }
          
          if ! run_with_clean_compile_install "kernel" "kernel_error.log"; then exit 1; fi
          if ! run_with_clean_compile_install "package" "package_error.log"; then exit 1; fi
          if ! run_with_clean_compile_install "target" "install_error.log"; then exit 1; fi
          
          echo "===== 所有环节编译成功！ ====="
          rm -rf build_dir/target tmp/target logs/target staging_dir/target
          rm -rf bin/targets/*/*/packages
          ls -lh bin/targets/*/*/
          if ls *.log 1> /dev/null 2>&1; then cp *.log /workdir/istoreos/; fi

      # ===================== 步骤8：生成更新日志 =====================
      - name: Generate Update Log
        run: |
          cd /workdir/istoreos
          echo "===== 自定义iStoreOS更新日志（istoreos-24.10分支） =====" > update_log.md
          git log --since="90 days ago" --pretty=format:"%cd - %s (%h)" --date=short >> update_log.md
          cat update_log.md

      # ===================== 步骤9：上传固件+日志 =====================
      - name: Upload Firmware & All Logs
        uses: actions/upload-artifact@v4
        with:
          name: Custom-iStoreOS-Firmware-${{ github.run_id }}-${{ env.REPO_BRANCH }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/update_log.md
            /workdir/istoreos/*.log
          retention-days: 180

      # ===================== 步骤10：清理旧Workflow记录 =====================
      - name: Clean Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 180
          keep_minimum_runs: 4
          github_token: ${{ secrets.GITHUB_TOKEN }}
