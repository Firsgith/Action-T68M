name: Build Custom iStoreOS (Quarterly)
permissions:
  actions: write
  contents: write
# 触发规则：每季度1/4/7/10月1号 UTC 0点（北京时间8点）+ 手动触发
on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:
env:
  REPO_URL: https://github.com/Firsgith/istoreos  # 自定义仓库
  REPO_BRANCH: istoreos-24.10                     # 指定分支
  TZ: Asia/Shanghai

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180  # 3小时超时
    steps:
      # ===================== 步骤1：清理系统空间 =====================
      - name: Clean System to Free Up Max Space
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get remove -y --purge gcc* g++* multilib*
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /var/log/* /tmp/*
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          df -hT /workdir

      # ===================== 步骤2：克隆iStoreOS源码 =====================
      - name: Clone Custom iStoreOS Source Code
        run: |
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          ln -sf /workdir/istoreos $GITHUB_WORKSPACE/istoreos
          cd /workdir/istoreos
          echo "当前分支："
          git branch -v

      # ===================== 步骤3：安装完整编译依赖（覆盖所有Prerequisites） =====================
      - name: Install All Required Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils bzip2 diff find flex gawk gcc g++ gcc-multilib g++-multilib \
            getopt grep install libc-dev libz-dev libncurses-dev libssl-dev \
            make perl python3 python3-distutils python3-setuptools rsync subversion \
            unzip which clang bison swig zlib1g-dev file wget build-essential
          echo "===== 关键依赖版本验证 ====="
          gcc --version | head -1
          make --version | head -1
          python3 --version
          sudo apt-get clean && rm -rf /var/lib/apt/lists/*

      # ===================== 步骤4：更新Feeds + 加载自定义.config =====================
      - name: Update Feeds and Load Custom .config
        run: |
          cd /workdir/istoreos
          ./scripts/feeds update -a && ./scripts/feeds install -a
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp $GITHUB_WORKSPACE/.config ./
            make defconfig
            echo "===== 自定义.config加载成功 ====="
            cat .config | grep -E 'TARGET_|CONFIG_PACKAGE_istore' | head -10
          else
            echo "===== 未找到自定义.config，使用默认配置 ====="
            make defconfig
          fi

      # ===================== 步骤5：下载依赖包 =====================
      - name: Download All Dependencies (Before Toolchain Build)
        run: |
          cd /workdir/istoreos
          # 批量下载所有编译依赖包（8线程提速）
          make download -j8
          # 清理无效下载包（小于1KB的文件）
          find dl -size -1024c -exec rm -f {} \;
          # 验证下载结果
          echo "===== 依赖包下载完成，当前dl目录大小 ====="
          du -sh dl/
          # 验证空间
          df -hT /workdir

      # ===================== 步骤6：编译工具链 =====================
      - name: Build Toolchain and Clean Temp Files
        run: |
          cd /workdir/istoreos
          make toolchain/install -j$(nproc)
          rm -rf build_dir/toolchain tmp/toolchain logs/toolchain
          df -hT /workdir

      # ===================== 步骤7：编译固件 =====================
      - name: Build Custom iStoreOS Firmware
        run: |
          cd /workdir/istoreos
          # 编译固件：多核 → 单核 → 详细日志（容错）
          make target/install -j$(nproc) || make -j1 || make -j1 V=s
          rm -rf build_dir/target tmp/target logs/target staging_dir/target
          rm -rf bin/targets/*/*/packages
          echo "===== 编译产物列表 ====="
          ls -lh bin/targets/*/*/

      # ===================== 步骤8：生成更新日志 =====================
      - name: Generate Update Log
        run: |
          cd /workdir/istoreos
          echo "===== 自定义iStoreOS更新日志（istoreos-24.10分支） =====" > update_log.md
          git log --since="90 days ago" --pretty=format:"%cd - %s (%h)" --date=short >> update_log.md
          cat update_log.md

      # ===================== 步骤9：上传固件 =====================
      - name: Upload Firmware & Update Log
        uses: actions/upload-artifact@v4
        with:
          name: Custom-iStoreOS-Firmware-${{ github.run_id }}-${{ env.REPO_BRANCH }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/update_log.md
          retention-days: 180

      # ===================== 步骤10：清理旧Workflow记录 =====================
      - name: Clean Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 180
          keep_minimum_runs: 4
          github_token: ${{ secrets.GITHUB_TOKEN }}
