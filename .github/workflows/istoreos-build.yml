name: Build Custom iStoreOS (Quarterly)

permissions:
  actions: write
  contents: write

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'  # 每季度1/4/7/10月1号 北京时间8点
  workflow_dispatch:             # 手动触发开关

env:
  REPO_URL: https://github.com/Firsgith/istoreos 
  REPO_BRANCH: istoreos-24.10
  TZ: Asia/Shanghai

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      # ===================== 步骤0：检出配置文件仓库（关键！）=====================
      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于生成更新日志

      # ===================== 步骤1：环境初始化 + 磁盘清理 =====================
      - name: Env Init & Disk Cleanup
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 系统清理（删除GitHub预装的臃肿软件，释放5-8GB空间）
          # 注意：iscsid警告无害，可忽略
          echo "===== 清理系统空间 ====="
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /usr/local/share/chromedriver-linux64
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get remove -y --purge firefox google-chrome-stable microsoft-edge-stable 2>/dev/null || true
          
          # 修复apt
          sudo apt-get update --fix-missing -o APT::Get::Show-User-Simulation-Note=no
          sudo apt-get -f install -y -o APT::Get::Show-User-Simulation-Note=no
          sudo apt-get autoremove -y 2>/dev/null || true
          
          # 创建工作目录
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          
          echo "===== 当前磁盘空间 ====="
          df -hT /

      # ===================== 步骤2：克隆iStoreOS源码 =====================
      - name: Clone iStoreOS Source
        run: |
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          cd /workdir/istoreos
          echo "当前编译分支：$(git branch -v)"

      # ===================== 步骤3：加载自定义.config =====================
      - name: Load Custom .config
        run: |
          CONFIG_SRC="$GITHUB_WORKSPACE/.config"
          CONFIG_DST="/workdir/istoreos/.config"
          
          echo "===== 验证自定义.config ====="
          ls -la $GITHUB_WORKSPACE/
          
          if [ -f "$CONFIG_SRC" ]; then
            cp -f "$CONFIG_SRC" "$CONFIG_DST"
            echo "✅ 已加载自定义.config"
            cat "$CONFIG_DST" | grep -E 'TARGET_|CONFIG_PACKAGE_istore' | head -10
            # 展开配置（确保依赖完整）
            cd /workdir/istoreos
            make defconfig
          else
            echo "⚠️ 未找到自定义.config，使用默认配置（请确保已将.config提交到GitHub仓库）"
            cd /workdir/istoreos
            make defconfig
          fi

      # ===================== 步骤4：安装编译依赖 =====================
      - name: Install Build Dependencies
        run: |
          # python3-distutils在Ubuntu 22.04+已移除，使用python3-pyelftools替代
          sudo apt-get install -y -o APT::Get::Show-User-Simulation-Note=no \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-pyelftools python3-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            diffutils findutils util-linux coreutils pkg-config patch
          echo "===== 核心命令验证 ====="
          command -v gettext && echo "gettext ✅" || echo "gettext ❌"
          command -v which && echo "which ✅" || echo "which ❌"

      # ===================== 步骤5：更新Feeds =====================
      - name: Update Feeds
        run: |
          cd /workdir/istoreos
          ./scripts/feeds update -a && ./scripts/feeds install -a

      # ===================== 步骤6：下载依赖包 =====================
      - name: Download Dependencies
        run: |
          cd /workdir/istoreos
          echo "===== 8线程下载依赖包 ====="
          make download -j8 2>&1 | tee download.log || {
            echo "⚠️ 下载出错，单线程重试"
            make download -j1 V=s 2>&1 | tee download_error.log
          }
          find dl -size -1024c -exec rm -f {} \;
          echo "===== 依赖包下载完成，dl目录大小：$(du -sh dl/) ====="

      # ===================== 步骤7：编译工具链（修正：不clean，阶段后清理空间）=====================
      - name: Build Toolchain
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          
          echo "===== 编译工具链（使用 $USE_CORES 核心） ====="
          set -o pipefail
          if ! make toolchain/compile -j$USE_CORES 2>&1 | tee toolchain.log; then
            echo "⚠️ 工具链编译出错，单线程V=s重试"
            make toolchain/compile -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed|ERROR:' toolchain_error.log | tail -20
            exit 1
          fi
          make toolchain/install -j$USE_CORES
          set +o pipefail
          
          echo "===== 工具链完成，清理中间文件释放空间 ====="
          df -hT /
          # 关键：只删build_dir中的编译目录，保留staging_dir/toolchain（已安装的成果）
          rm -rf build_dir/toolchain-* build_dir/host build_dir/hostpkg
          df -hT /

      # ===================== 步骤8：编译内核（修正：不clean）=====================
      - name: Build Kernel
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          
          echo "===== 编译内核（使用 $USE_CORES 核心） ====="
          set -o pipefail
          if ! make kernel/compile -j$USE_CORES 2>&1 | tee kernel.log; then
            echo "⚠️ 内核编译出错，单线程V=s重试"
            make kernel/compile -j1 V=s 2>&1 | tee kernel_error.log
            grep -E 'error:|Failed|ERROR:' kernel_error.log | tail -20
            exit 1
          fi
          make kernel/install -j$USE_CORES
          set +o pipefail
          
          echo "===== 内核完成，清理中间文件 ====="
          rm -rf build_dir/linux-* build_dir/target/linux
          df -hT /

      # ===================== 步骤9：编译包（保留原版重试逻辑，修正clean问题）=====================
      - name: Build Packages (Parallel + Serial Retry)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          RETRY_SUCCESS=true
          
          echo "===== 第一步：并行编译所有包（使用 $USE_CORES 核心） ====="
          # 关键：不再执行make package/clean，直接编译
          set -o pipefail
          if ! make package/compile -j$USE_CORES 2>&1 | tee package.log; then
            echo "===== 检测到包编译失败，开始串行精准重试 ====="
            
            # 提取所有出错包（去重）- 保留原版逻辑
            FAILED_PKGS=$(grep "ERROR: package/" package.log | awk -F'/' '{print $2}' | awk '{print $1}' | uniq)
            echo "需要重试的包列表：$FAILED_PKGS"
            
            # 逐个重试出错包
            for pkg in $FAILED_PKGS; do
              echo "===== 处理出错包：$pkg ====="
              # 只clean特定失败的包，不是全部clean
              make package/$pkg/clean
              
              if ! make package/$pkg/compile -j1 V=s 2>&1 | tee ${pkg}_retry.log; then
                echo "❌ $pkg 重试编译失败！"
                grep -E 'error:|Failed|ERROR:' ${pkg}_retry.log | tail -20
                RETRY_SUCCESS=false
              else
                echo "✅ $pkg 重试编译成功！"
                make package/$pkg/install -j1
              fi
            done
            
            if [ "$RETRY_SUCCESS" = "false" ]; then
              echo "❌ 部分包重试失败，终止编译流程"
              exit 1
            else
              echo "✅ 所有出错包重试成功！"
            fi
          else
            echo "✅ 所有包并行编译成功！"
            make package/install -j$USE_CORES
          fi
          set +o pipefail
          
          echo "===== 软件包完成，清理中间文件 ====="
          rm -rf build_dir/package/*
          df -hT /

      # ===================== 步骤10：编译固件（修正：不clean）=====================
      - name: Build Final Firmware
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          
          echo "===== 打包固件（使用 $USE_CORES 核心） ====="
          set -o pipefail
          if ! make target/compile -j$USE_CORES 2>&1 | tee target.log; then
            echo "⚠️ 固件打包出错，单线程V=s重试"
            make target/compile -j1 V=s 2>&1 | tee target_error.log
            grep -E 'error:|Failed|ERROR:' target_error.log | tail -20
            exit 1
          fi
          make target/install -j$USE_CORES
          set +o pipefail
          
          # 最终清理：只保留固件产物
          rm -rf build_dir/target tmp/target staging_dir/target
          rm -rf bin/targets/*/*/packages
          echo "===== 编译产物列表 ====="
          ls -lh bin/targets/*/*/

      # ===================== 步骤11：生成更新日志 =====================
      - name: Generate Update Log
        run: |
          cd /workdir/istoreos
          echo "# 自定义iStoreOS更新日志（${{ env.REPO_BRANCH }}）" > update_log.md
          echo "生成时间：$(date +'%Y-%m-%d %H:%M:%S')" >> update_log.md
          echo "---" >> update_log.md
          git log --since="90 days ago" --pretty=format:"- %cd: %s (%h)" --date=short >> update_log.md

      # ===================== 步骤12：上传固件+日志（成功时）=====================
      - name: Upload Firmware & Logs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Custom-iStoreOS-${{ github.run_id }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/bin/targets/*/*/*.bin
            /workdir/istoreos/update_log.md
            /workdir/istoreos/*.log
          retention-days: 30

      # ===================== 步骤13：失败诊断（失败时执行）=====================
      - name: Failure Diagnostics
        if: failure()
        run: |
          cd /workdir/istoreos 2>/dev/null || cd $GITHUB_WORKSPACE
          echo "::error::编译失败，开始收集诊断信息..."
          
          echo "===== 磁盘空间状态（检查是否因空间不足失败）====="
          df -hT /
          
          echo "===== 查找 config.log（通常是配置检测错误）====="
          find build_dir -name "config.log" -type f -mmin -60 2>/dev/null | head -5 | while read log; do
            echo "--- $log ---"
            tail -30 "$log"
          done
          
          echo "===== 检查 staging_dir 完整性 ====="
          ls -la staging_dir/toolchain-*/bin/ 2>/dev/null | head -5 || echo "⚠️ toolchain 可能未正确安装"
          
          echo "===== 最近错误摘要 ====="
          grep -h "error:" *.log 2>/dev/null | tail -10 || true

      # ===================== 步骤14：上传失败现场（失败时）=====================
      - name: Upload Failure Debug Info
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-failed-${{ github.run_id }}
          path: |
            /workdir/istoreos/build_dir/*/config.log
            /workdir/istoreos/*_error.log
            /workdir/istoreos/*_retry.log
            /workdir/istoreos/*.log
          retention-days: 7

      # ===================== 步骤15：清理旧Workflow记录（始终执行）=====================
      - name: Clean Old Workflow Runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2.0.3
        with:
          retain_days: 30
          keep_minimum_runs: 4
          github_token: ${{ secrets.GITHUB_TOKEN }}
