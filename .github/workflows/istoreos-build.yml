name: Build Custom iStoreOS (Quarterly)

permissions:
  actions: write
  contents: write

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/Firsgith/istoreos
  REPO_BRANCH: istoreos-24.10
  TZ: Asia/Shanghai

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      # ===================== 步骤1：安全清理 + 修复源 + 屏蔽警告 =====================
      - name: Clean System & Fix Sources (No Warnings)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 屏蔽所有无关警告（重定向stderr到stdout，仅保留致命错误）
          set +e
          # 删除冗余大文件（安全）
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force > /dev/null 2>&1
          # 安全清理，屏蔽目录非空警告
          sudo apt-get autoremove -y --purge > /dev/null 2>&1
          sudo apt-get clean > /dev/null 2>&1
          sudo rm -rf /var/lib/apt/lists/* /var/log/* /tmp/*
          # 切换到官方Ubuntu源（解决Azure源缺失which包问题）
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
          sudo echo "deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse" > /etc/apt/sources.list
          sudo echo "deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse" >> /etc/apt/sources.list
          sudo echo "deb http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse" >> /etc/apt/sources.list
          sudo echo "deb http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse" >> /etc/apt/sources.list
          # 修复依赖，屏蔽apt CLI警告
          sudo apt-get update --fix-missing -o APT::Get::Show-User-Simulation-Note=no > /dev/null 2>&1
          sudo apt-get -f install -y -o APT::Get::Show-User-Simulation-Note=no > /dev/null 2>&1
          set -e
          # 创建工作目录
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          df -hT /workdir

      # ===================== 步骤2：克隆源码 =====================
      - name: Clone iStoreOS Source Code
        run: |
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          ln -sf /workdir/istoreos $GITHUB_WORKSPACE/istoreos
          cd /workdir/istoreos
          echo "当前编译分支："
          git branch -v

      # ===================== 步骤3：安装依赖（移除which，通过coreutils替代） =====================
      - name: Install Build Dependencies (Fixed - No 'which' Package)
        run: |
          # 屏蔽apt CLI警告，强制更新源
          sudo apt-get update --fix-missing -o APT::Get::Show-User-Simulation-Note=no > /dev/null 2>&1
          sudo apt-get -f install -y -o APT::Get::Show-User-Simulation-Note=no > /dev/null 2>&1
          # 安装依赖（移除which，coreutils/util-linux已包含which命令）
          sudo apt-get install -y -o APT::Get::Show-User-Simulation-Note=no \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget \
            diffutils findutils util-linux coreutils pkg-config patch
          # 验证核心命令（包括which，通过util-linux提供）
          echo "===== 核心命令验证 ====="
          command -v gettext && echo "gettext ✅" || echo "gettext ❌"
          command -v diff && echo "diff ✅" || echo "diff ❌"
          command -v getopt && echo "getopt ✅" || echo "getopt ❌"
          command -v which && echo "which ✅" || echo "which ❌"
          command -v gcc && echo "gcc ✅" || echo "gcc ❌"
          # 验证版本
          echo "===== 关键依赖版本 ====="
          gcc --version | head -1
          make --version | head -1
          python3 --version

      # ===================== 步骤4：更新Feeds + 加载.config =====================
      - name: Update Feeds & Load Custom .config
        run: |
          cd /workdir/istoreos
          ./scripts/feeds update -a && ./scripts/feeds install -a
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp $GITHUB_WORKSPACE/.config ./
            make defconfig
            echo "===== 自定义.config加载成功 ====="
            cat .config | grep -E 'TARGET_|CONFIG_PACKAGE_istore' | head -10
          else
            echo "===== 未找到自定义.config，使用默认配置 ====="
            make defconfig
          fi

      # ===================== 步骤5：下载依赖包（容错） =====================
      - name: Download Dependencies (Error Handling)
        run: |
          cd /workdir/istoreos
          echo "===== 开始下载依赖包（8线程） ====="
          if ! make download -j8; then
            echo "===== 下载出错，单线程+详细日志重新下载 ====="
            make download -j1 V=s 2>&1 | tee download_error.log
            grep -E 'error:|Failed|404|timeout' download_error.log | tail -20
            echo "===== 最终重试下载 ====="
            make download -j1 || echo "===== 下载仍失败，请检查网络/源地址 ====="
          fi
          find dl -size -1024c -exec rm -f {} \;
          echo "===== 依赖包下载完成，dl目录大小 ====="
          du -sh dl/
          df -hT /workdir

      # ===================== 步骤6：编译工具链 =====================
      - name: Build Toolchain (Clean→Compile→Install)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          echo "===== 编译工具链（总核心$CORES，使用$USE_CORES核心） ====="
          
          make toolchain/clean
          if ! make toolchain/compile -j$USE_CORES; then
            echo "===== 工具链编译出错，单线程+详细日志 ====="
            make toolchain/compile -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed' toolchain_error.log | tail -20
            exit 1
          fi
          if ! make toolchain/install -j$USE_CORES; then
            echo "===== 工具链安装出错，单线程+详细日志 ====="
            make toolchain/install -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed' toolchain_error.log | tail -20
            exit 1
          fi
          
          rm -rf build_dir/toolchain tmp/toolchain logs/toolchain
          df -hT /workdir

      # ===================== 步骤7：编译固件 =====================
      - name: Build Firmware (Full Clean→Compile→Install)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          echo "===== 固件编译（总核心$CORES，使用$USE_CORES核心） ====="
          
          run_with_fault_tolerance() {
            local target=$1
            local log_file=$2
            echo "===== 处理环节：$target ====="
            
            make $target/clean
            if ! make $target/compile -j$USE_CORES; then
              echo "===== [$target compile] 出错，单线程+详细日志 ====="
              make $target/compile -j1 V=s 2>&1 | tee $log_file
              grep -E 'error:|Failed' $log_file | tail -20
              return 1
            fi
            if ! make $target/install -j$USE_CORES; then
              echo "===== [$target install] 出错，单线程+详细日志 ====="
              make $target/install -j1 V=s 2>&1 | tee $log_file
              grep -E 'error:|Failed' $log_file | tail -20
              return 1
            fi
            return 0
          }
          
          if ! run_with_fault_tolerance "kernel" "kernel_error.log"; then exit 1; fi
          if ! run_with_fault_tolerance "package" "package_error.log"; then exit 1; fi
          if ! run_with_fault_tolerance "target" "install_error.log"; then exit 1; fi
          
          echo "===== 固件编译成功！ ====="
          rm -rf build_dir/target tmp/target logs/target staging_dir/target
          rm -rf bin/targets/*/*/packages
          echo "===== 编译产物列表 ====="
          ls -lh bin/targets/*/*/
          if ls *.log 1> /dev/null 2>&1; then cp *.log /workdir/istoreos/; fi

      # ===================== 步骤8：生成更新日志 =====================
      - name: Generate Update Log
        run: |
          cd /workdir/istoreos
          echo "# 自定义iStoreOS更新日志（${{ env.REPO_BRANCH }}分支）" > update_log.md
          echo "生成时间：$(date +'%Y-%m-%d %H:%M:%S')" >> update_log.md
          echo "---" >> update_log.md
          git log --since="90 days ago" --pretty=format:"- %cd: %s (%h)" --date=short >> update_log.md
          cat update_log.md | head -20

      # ===================== 步骤9：上传固件+日志 =====================
      - name: Upload Firmware & Logs
        uses: actions/upload-artifact@v4
        with:
          name: Custom-iStoreOS-${{ github.run_id }}-${{ env.REPO_BRANCH }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/update_log.md
            /workdir/istoreos/*.log
          retention-days: 180

      # ===================== 步骤10：清理旧Workflow记录 =====================
      - name: Clean Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 180
          keep_minimum_runs: 4
          github_token: ${{ secrets.GITHUB_TOKEN }}
