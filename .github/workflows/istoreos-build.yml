name: Build Custom iStoreOS (Quarterly)

# 权限配置（满足所有操作需求）
permissions:
  actions: write   # 上传产物、清理旧Workflow记录
  contents: write  # 读写仓库内容、管理Release/Tag

# 触发规则：每季度1/4/7/10月1号 UTC 0点（北京时间8点）+ 手动触发
on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

# 自定义环境变量（适配你的仓库/分支）
env:
  REPO_URL: https://github.com/Firsgith/istoreos  # 你的自定义仓库
  REPO_BRANCH: istoreos-24.10                     # 你的指定分支
  TZ: Asia/Shanghai                               # 时区配置

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    timeout-minutes: 180  # 3小时超时，避免编译卡死
    steps:
      # ===================== 步骤1：极致清理系统空间 =====================
      - name: Clean System to Free Up Max Space
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 删除Runner预装的冗余大文件（释放~10GB）
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          # 清理旧编译器，避免版本冲突
          sudo apt-get remove -y --purge gcc* g++* multilib*
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /var/log/* /tmp/*
          # 创建根分区下的工作目录（避开默认目录空间限制）
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir
          # 验证清理后空间
          df -hT /workdir

      # ===================== 步骤2：克隆你的自定义iStoreOS源码 =====================
      - name: Clone Custom iStoreOS Source Code
        run: |
          # 拉取完整源码（非浅克隆，保证分支完整）
          git clone $REPO_URL -b $REPO_BRANCH /workdir/istoreos
          ln -sf /workdir/istoreos $GITHUB_WORKSPACE/istoreos
          cd /workdir/istoreos
          # 验证分支是否正确
          echo "当前分支："
          git branch -v

      # ===================== 步骤3：安装完整编译依赖（覆盖所有Prerequisites） =====================
      - name: Install All Required Build Dependencies
        run: |
          sudo apt-get update
          # 安装你指定的所有依赖（Requirements + Prerequisites）
          sudo apt-get install -y \
            binutils bzip2 diff find flex gawk gcc g++ gcc-multilib g++-multilib \
            getopt grep install libc-dev libz-dev libncurses-dev libssl-dev \
            make perl python3 python3-distutils python3-setuptools rsync subversion \
            unzip which clang bison swig zlib1g-dev file wget build-essential
          # 验证关键依赖版本（确保满足要求：gcc6+、make4.1+、python3.7+）
          echo "===== 关键依赖版本验证 ====="
          gcc --version | head -1
          make --version | head -1
          python3 --version
          # 清理apt缓存
          sudo apt-get clean && rm -rf /var/lib/apt/lists/*

      # ===================== 步骤4：更新Feeds + 加载自定义.config =====================
      - name: Update Feeds and Load Custom .config
        run: |
          cd /workdir/istoreos
          # 更新并安装feeds（iStoreOS必需）
          ./scripts/feeds update -a && ./scripts/feeds install -a
          # 加载仓库根目录的.config文件（你的自定义配置）
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp $GITHUB_WORKSPACE/.config ./
            # 自动适配配置（修复版本兼容问题）
            make defconfig
            echo "===== 自定义.config加载成功 ====="
            cat .config | grep -E 'TARGET_|CONFIG_PACKAGE_istore' | head -10
          else
            echo "===== 未找到自定义.config，使用默认配置 ====="
            make defconfig
          fi

      # ===================== 步骤5：下载依赖包（容错+详细日志） =====================
      - name: Download All Dependencies (Error Handling)
        run: |
          cd /workdir/istoreos
          echo "===== 开始下载依赖包（8线程） ====="
          # 第一步：多线程下载
          if ! make download -j8; then
            echo "===== 依赖包下载出错，单线程+详细日志重新下载 ====="
            # 第二步：单线程+详细日志下载，输出完整错误
            make download -j1 V=s 2>&1 | tee download_error.log
            echo "===== 下载错误日志已保存：download_error.log ====="
            # 打印关键错误
            grep -E 'error:|Error:|ERROR:|failed|Failed|404|timeout' download_error.log | tail -20
            # 尝试修复常见下载错误（比如重试）
            echo "===== 尝试修复下载错误：重试下载 ====="
            make download -j1 || echo "===== 下载仍失败，请检查网络/源地址 ====="
          fi
          # 清理无效下载包
          find dl -size -1024c -exec rm -f {} \;
          echo "===== 依赖包下载完成，当前dl目录大小 ====="
          du -sh dl/
          df -hT /workdir

      # ===================== 步骤6：编译工具链（clean→compile→install + 留1线程） =====================
      - name: Build Toolchain (Clean→Compile→Install)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          echo "===== 编译工具链（使用 $USE_CORES 核心，留1核心） ====="
          
          # Step 1: Clean 清空工具链缓存
          make toolchain/clean
          # Step 2: Compile 仅编译工具链
          if ! make toolchain/compile -j$USE_CORES; then
            echo "===== 工具链编译出错，单线程+详细日志排查 ====="
            make toolchain/compile -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed|ERROR:' toolchain_error.log | tail -20
            exit 1
          fi
          # Step 3: Install 安装工具链
          if ! make toolchain/install -j$USE_CORES; then
            echo "===== 工具链安装出错，单线程+详细日志排查 ====="
            make toolchain/install -j1 V=s 2>&1 | tee toolchain_error.log
            grep -E 'error:|Failed|ERROR:' toolchain_error.log | tail -20
            exit 1
          fi
          
          # 清理工具链临时文件
          rm -rf build_dir/toolchain tmp/toolchain logs/toolchain
          df -hT /workdir

      # ===================== 步骤7：编译固件（全环节 clean→compile→install + 留1线程） =====================
      - name: Build Firmware (Full Clean→Compile→Install)
        run: |
          cd /workdir/istoreos
          CORES=$(nproc)
          USE_CORES=$((CORES - 1))
          echo "===== 编译配置：总核心数 $CORES，使用 $USE_CORES 核心（留1核心） ====="
          
          # 通用错误排查函数：clean→compile→install 完整流程
          run_with_clean_compile_install() {
            local target=$1
            local log_file=$2
            echo "===== 处理环节：$target ====="
            
            # Step 1: Clean 清空该环节缓存
            make $target/clean
            echo "===== 已清空 $target 缓存 ====="
            
            # Step 2: Compile 仅编译，排查纯编译错误
            if ! make $target/compile -j$USE_CORES; then
              echo "===== 【$target compile】出错，单线程+详细日志 ====="
              make $target/compile -j1 V=s 2>&1 | tee $log_file
              grep -E 'error:|Failed|ERROR:' $log_file | tail -20
              return 1
            fi
            
            # Step 3: Install 编译成功后，验证安装
            if ! make $target/install -j$USE_CORES; then
              echo "===== 【$target install】出错，单线程+详细日志 ====="
              make $target/install -j1 V=s 2>&1 | tee $log_file
              grep -E 'error:|Failed|ERROR:' $log_file | tail -20
              return 1
            fi
            
            echo "===== $target 环节 clean→compile→install 完成 ====="
            return 0
          }
          
          # 分层执行 clean→compile→install
          # 1. 内核环节
          if ! run_with_clean_compile_install "kernel" "kernel_error.log"; then
            echo "===== 内核环节失败，终止编译 ====="
            exit 1
          fi
          
          # 2. 所有软件包环节
          if ! run_with_clean_compile_install "package" "package_error.log"; then
            echo "===== 包环节失败，终止编译 ====="
            exit 1
          fi
          
          # 3. 固件打包环节
          if ! run_with_clean_compile_install "target" "install_error.log"; then
            echo "===== 固件打包环节失败，终止编译 ====="
            exit 1
          fi
          
          echo "===== 所有环节编译成功！ ====="
          
          # 清理固件临时文件
          rm -rf build_dir/target tmp/target logs/target staging_dir/target
          rm -rf bin/targets/*/*/packages
          # 查看编译产物
          echo "===== 编译产物列表 ====="
          ls -lh bin/targets/*/*/
          
          # 收集所有错误日志（如有）
          if ls *.log 1> /dev/null 2>&1; then
            cp *.log /workdir/istoreos/
            echo "===== 错误日志已收集 ====="
          fi

      # ===================== 步骤8：生成更新日志 =====================
      - name: Generate Update Log
        run: |
          cd /workdir/istoreos
          # 生成近90天的提交更新日志
          echo "===== 自定义iStoreOS更新日志（istoreos-24.10分支） =====" > update_log.md
          git log --since="90 days ago" --pretty=format:"%cd - %s (%h)" --date=short >> update_log.md
          # 打印日志
          cat update_log.md

      # ===================== 步骤9：上传固件 + 日志（保留180天） =====================
      - name: Upload Firmware & All Logs
        uses: actions/upload-artifact@v4
        with:
          name: Custom-iStoreOS-Firmware-${{ github.run_id }}-${{ env.REPO_BRANCH }}
          path: |
            /workdir/istoreos/bin/targets/*/*/*.img.gz
            /workdir/istoreos/update_log.md
            /workdir/istoreos/*.log  # 上传所有错误日志（如有）
          retention-days: 180  # 固件/日志保留180天（6个月）

      # ===================== 步骤10：清理旧Workflow记录 =====================
      - name: Clean Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 180     # 保留180天运行记录
          keep_minimum_runs: 4 # 至少保留4条（对应4个季度）
          github_token: ${{ secrets.GITHUB_TOKEN }}
